<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>imToken DS Mobile Send Flow Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page: linear-gradient(180deg, #f9fdff 0%, #f0f1f3 100%);
    --bg-general: #ffffff;
    --bg-card: #ffffff;
    --bg-muted: #f9fafb;
    --bg-inner: #f0f1f3;
    --bg-chip: #f0f1f3;
    --text-primary: #111d4a;
    --text-secondary: rgba(17, 29, 74, 0.4);
    --text-placeholder: rgba(17, 29, 74, 0.2);
    --text-action: #007fff;
    --border-default: rgba(17, 29, 74, 0.08);
    --accent: #007fff;
    --accent-soft: #d6ebff;
    --danger-soft: #fff3f0;
    --danger-text: #b24b2f;
    --success: #06b57a;
    --space-4: 4px;
    --space-8: 8px;
    --space-12: 12px;
    --space-16: 16px;
    --space-20: 20px;
    --space-24: 24px;
    --space-32: 32px;
    --radius-sm: 4px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --radius-full: 9999px;
    --phone-width: 375px;
    --type-nav-title-size: 16px;
    --type-nav-title-weight: 700;
    --type-nav-title-line: 1.4;
    --type-nav-title-track: 0.04em;
    --type-body-primary-size: 16px;
    --type-body-primary-weight: 500;
    --type-body-primary-line: 1.4;
    --type-body-primary-track: 0.04em;
    --type-body-secondary-size: 14px;
    --type-body-secondary-weight: 400;
    --type-body-secondary-line: 1.4;
    --type-body-secondary-track: 0.04em;
    --type-section-lead-size: 20px;
    --type-section-lead-weight: 500;
    --type-section-lead-line: 1.4;
    --type-section-lead-track: 0.04em;
    --type-hero-amount-size: 32px;
    --type-hero-amount-weight: 700;
    --type-hero-amount-line: 1.4;
    --type-hero-amount-track: 0.04em;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px 16px;
    font-family: "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text-primary);
    background: radial-gradient(circle at top, rgba(214, 235, 255, 0.9), transparent 38%), #eef3f7;
  }

  .stage {
    width: min(100%, 960px);
    display: grid;
    gap: 24px;
    justify-items: center;
  }

  .caption {
    width: min(100%, 720px);
    display: grid;
    gap: 8px;
    text-align: center;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .caption h1 {
    margin: 0;
    font-size: clamp(22px, 4vw, 30px);
    line-height: 1.2;
  }

  .caption p {
    margin: 0;
    font-size: var(--type-body-secondary-size);
    font-weight: var(--type-body-secondary-weight);
    line-height: var(--type-body-secondary-line);
    letter-spacing: var(--type-body-secondary-track);
    color: var(--text-secondary);
  }

  .phone {
    width: var(--phone-width);
    min-height: 812px;
    background: var(--bg-page);
    border: 1px solid rgba(17, 29, 74, 0.12);
    border-radius: 40px;
    padding: 16px 16px 20px;
    box-shadow: 0 30px 80px rgba(17, 29, 74, 0.18);
    position: relative;
    overflow: hidden;
  }

  .phone::before {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 32px;
    border: 1px solid rgba(255, 255, 255, 0.8);
    pointer-events: none;
  }

  .status-bar,
  .nav-shell,
  .stepper,
  .content,
  .footer {
    position: relative;
    z-index: 1;
  }

  .status-bar {
    display: none;
  }

  .nav-shell {
    position: relative;
    min-height: 90px;
  }

  .primary-nav,
  .secondary-nav {
    position: absolute;
    inset: 0;
  }

  .primary-nav {
    min-height: 90px;
  }

  .nav-status {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 21px 27px 0 21px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .nav-status-right {
    font-size: 12px;
    color: var(--text-primary);
    letter-spacing: 0.02em;
  }

  .nav-backdrop {
    position: absolute;
    inset: 0 0 auto;
    height: 90px;
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
    background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0) 100%);
    pointer-events: none;
  }

  .nav-row {
    position: absolute;
    left: 16px;
    right: 16px;
    top: 54px;
    width: 343px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-brand-icon {
    width: 24px;
    height: 16.7px;
    position: relative;
  }

  .nav-brand-icon img {
    display: block;
    width: 100%;
    height: 100%;
  }

  .nav-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-icon {
    width: 24px;
    height: 24px;
    display: grid;
    place-items: center;
  }

  .nav-icon img {
    display: block;
    width: 100%;
    height: 100%;
  }

  .token-bar {
    position: absolute;
    left: 50%;
    top: 50px;
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    padding-right: 14px;
    border-radius: var(--radius-full);
    background: var(--bg-general);
    border: 1px solid var(--border-default);
    box-shadow: 0 8px 20px rgba(17, 29, 74, 0.05);
  }

  .token-stack {
    display: block;
    width: 96px;
    height: 24px;
  }

  .token-stack img {
    display: block;
    width: 100%;
    height: 100%;
  }

  .beta-pill {
    position: absolute;
    left: 48px;
    top: 57px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 8px;
    border-radius: var(--radius-sm);
    border: 1px solid #4fa1f5;
    background: rgba(255, 255, 255, 0.62);
    box-shadow: 1.5px 1.5px 15px rgba(0, 0, 0, 0.12);
    color: rgba(0, 127, 255, 0.8);
    font-size: 10px;
    letter-spacing: 0.04em;
  }

  .secondary-nav {
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid rgba(17, 29, 74, 0.04);
    border-bottom: 1px solid rgba(17, 29, 74, 0.08);
    background: rgba(255, 255, 255, 0.88);
  }

  .secondary-title {
    font-size: var(--type-nav-title-size);
    line-height: var(--type-nav-title-line);
    letter-spacing: var(--type-nav-title-track);
    font-weight: var(--type-nav-title-weight);
    color: var(--text-primary);
  }

  .secondary-back {
    position: absolute;
    left: 17px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: transparent;
    padding: 0;
    cursor: pointer;
    width: 24px;
    height: 24px;
  }

  .secondary-back img {
    display: block;
    width: 24px;
    height: 24px;
  }

  .secondary-nav::before,
  .secondary-nav::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background-repeat: no-repeat;
    background-size: 100% 100%;
  }

  .secondary-nav::before {
    top: 0;
    background-image: var(--nav-secondary-top-line);
  }

  .secondary-nav::after {
    bottom: 0;
    background-image: var(--nav-secondary-bottom-line);
  }

  .stepper {
    display: flex;
    gap: 8px;
    padding: 0 4px 16px;
  }

  .step-dot {
    flex: 1;
    height: 6px;
    border-radius: var(--radius-full);
    background: rgba(17, 29, 74, 0.1);
    overflow: hidden;
  }

  .step-dot.active::before,
  .step-dot.complete::before {
    content: "";
    display: block;
    height: 100%;
    background: var(--accent);
  }

  .step-dot.complete::before {
    width: 100%;
  }

  .content {
    display: grid;
    gap: 16px;
    min-height: 580px;
    padding: 8px 4px 0;
  }

  .hero {
    display: grid;
    gap: 8px;
  }

  .hero small {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .hero h2 {
    margin: 0;
    font-size: var(--type-section-lead-size);
    line-height: var(--type-section-lead-line);
    letter-spacing: var(--type-section-lead-track);
    font-weight: var(--type-section-lead-weight);
  }

  .hero p {
    margin: 0;
    font-size: var(--type-body-secondary-size);
    font-weight: var(--type-body-secondary-weight);
    line-height: var(--type-body-secondary-line);
    letter-spacing: var(--type-body-secondary-track);
    color: var(--text-secondary);
  }

  .panel,
  .token-card,
  .summary-row,
  .contact-chip,
  .notice {
    border-radius: var(--radius-lg);
  }

  .panel,
  .token-card,
  .summary-row,
  .notice {
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid rgba(255, 255, 255, 0.88);
    box-shadow: 0 18px 32px rgba(17, 29, 74, 0.08);
  }

  .panel {
    padding: 16px;
    display: grid;
    gap: 16px;
  }

  .section-label {
    margin: 0;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .token-card {
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(214, 235, 255, 0.42));
  }

  .token-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    background: var(--accent);
    color: white;
    font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
  }

  .token-meta {
    display: grid;
    gap: 2px;
    flex: 1;
  }

  .token-meta strong {
    font-size: var(--type-body-primary-size);
    font-weight: var(--type-body-primary-weight);
    line-height: var(--type-body-primary-line);
    letter-spacing: var(--type-body-primary-track);
  }

  .token-meta span,
  .meta-row span,
  .summary-row small,
  .address-pill,
  .helper {
    color: var(--text-secondary);
    font-size: var(--type-body-secondary-size);
    font-weight: var(--type-body-secondary-weight);
    line-height: var(--type-body-secondary-line);
    letter-spacing: var(--type-body-secondary-track);
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }

  .amount-box,
  .input-shell {
    border-radius: 24px;
    background: var(--bg-general);
    border: 1px solid var(--border-default);
    padding: 16px;
  }

  .amount-box {
    display: grid;
    gap: 10px;
  }

  .amount-field {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .amount-field input,
  .input-shell input {
    appearance: none;
    width: 100%;
    border: none;
    background: transparent;
    color: var(--text-primary);
    font: inherit;
    outline: none;
  }

  .amount-field input {
    font-size: var(--type-hero-amount-size);
    font-weight: var(--type-hero-amount-weight);
    line-height: var(--type-hero-amount-line);
    letter-spacing: calc(var(--type-hero-amount-track) * -1);
  }

  .amount-unit {
    font-size: var(--type-body-primary-size);
    font-weight: var(--type-body-primary-weight);
    line-height: var(--type-body-primary-line);
    letter-spacing: var(--type-body-primary-track);
    color: var(--text-secondary);
  }

  .helper {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }

  .quick-actions,
  .contact-grid,
  .review-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .quick-pill,
  .contact-chip {
    border: 1px solid var(--border-default);
    background: rgba(255, 255, 255, 0.72);
    color: var(--text-primary);
    font: inherit;
    padding: 10px 14px;
    border-radius: var(--radius-full);
    cursor: pointer;
  }

  .quick-pill.active,
  .contact-chip.active {
    background: var(--accent-soft);
    border-color: transparent;
    color: var(--accent);
  }

  .input-shell {
    display: grid;
    gap: 8px;
  }

  .input-shell label {
    font-size: var(--type-body-secondary-size);
    font-weight: var(--type-body-secondary-weight);
    line-height: var(--type-body-secondary-line);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .address-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: var(--radius-full);
    background: var(--bg-inner);
  }

  .summary-row {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
  }

  .summary-row strong {
    font-size: var(--type-body-primary-size);
    font-weight: var(--type-body-primary-weight);
    line-height: var(--type-body-primary-line);
    letter-spacing: var(--type-body-primary-track);
  }

  .summary-row span {
    font-size: var(--type-body-secondary-size);
    font-weight: var(--type-body-secondary-weight);
    line-height: var(--type-body-secondary-line);
    letter-spacing: var(--type-body-secondary-track);
    text-align: right;
  }

  .notice {
    padding: 14px 16px;
    background: var(--danger-soft);
    border-color: rgba(178, 75, 47, 0.12);
  }

  .notice strong {
    display: block;
    margin-bottom: 4px;
    font-size: var(--type-body-primary-size);
    font-weight: var(--type-body-primary-weight);
    line-height: var(--type-body-primary-line);
    letter-spacing: var(--type-body-primary-track);
    color: var(--danger-text);
  }

  .notice p {
    margin: 0;
    font-size: var(--type-body-secondary-size);
    font-weight: var(--type-body-secondary-weight);
    line-height: var(--type-body-secondary-line);
    letter-spacing: var(--type-body-secondary-track);
    color: rgba(178, 75, 47, 0.82);
  }

  .success-shell {
    display: grid;
    gap: 16px;
    align-content: center;
    min-height: 100%;
    padding-top: 32px;
  }

  .success-badge {
    width: 76px;
    height: 76px;
    border-radius: 28px;
    display: grid;
    place-items: center;
    background: linear-gradient(180deg, #dff9ef, #bff1dc);
    color: var(--success);
    font-size: 34px;
    box-shadow: 0 20px 40px rgba(6, 181, 122, 0.16);
  }

  .footer {
    display: grid;
    gap: 12px;
    padding: 20px 4px 0;
  }

  .footer-meta {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    font-size: var(--type-body-secondary-size);
    font-weight: var(--type-body-secondary-weight);
    line-height: var(--type-body-secondary-line);
    letter-spacing: var(--type-body-secondary-track);
    color: var(--text-secondary);
  }

  .cta {
    border: none;
    border-radius: 20px;
    background: var(--accent);
    color: white;
    font: inherit;
    font-weight: 400;
    font-size: var(--type-body-primary-size);
    line-height: var(--type-body-primary-line);
    letter-spacing: var(--type-body-primary-track);
    padding: 16px 18px;
    box-shadow: 0 18px 28px rgba(0, 127, 255, 0.28);
    cursor: pointer;
  }

  .cta[disabled] {
    cursor: not-allowed;
    opacity: 0.45;
    box-shadow: none;
  }

  .footer-secondary {
    font-size: var(--type-body-secondary-size);
    font-weight: var(--type-body-secondary-weight);
    line-height: var(--type-body-secondary-line);
    letter-spacing: var(--type-body-secondary-track);
    text-align: center;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="caption">
      <div class="eyebrow">R2D2@DS quick demo</div>
      <h1>Mobile token send flow</h1>
      <p>Standalone prototype using the repo token values and the linked Figma navigation language as the mobile shell.</p>
    </div>

    <div class="phone">
      <div class="nav-shell" id="navShell"></div>

      <div class="stepper" id="stepper"></div>
      <div class="content" id="content"></div>

      <div class="footer">
        <div class="footer-meta">
          <span id="footerLeft">Wallet 1 · Ethereum</span>
          <span id="footerRight">Safe preview</span>
        </div>
        <button class="cta" id="ctaButton" type="button"></button>
        <div class="footer-secondary" id="footerNote">Demo state only. No transaction is signed.</div>
      </div>
    </div>
  </div>

<script>
  const assets = {
    primaryLogo: "https://www.figma.com/api/mcp/asset/3452b539-4dd2-4360-910b-3c77386b0b67",
    primaryTokens: "https://www.figma.com/api/mcp/asset/60b33154-2263-43ff-90e7-d6e31982c9c8",
    primarySearch: "https://www.figma.com/api/mcp/asset/9e023a77-3671-45a8-b20a-5169086ac553",
    primaryMenu: "https://www.figma.com/api/mcp/asset/0cff6fa0-07c3-45e5-9260-4133e0a9c1e4",
    secondaryBack: "https://www.figma.com/api/mcp/asset/7803adc9-da21-4282-9418-f9c713509032",
    secondaryTopLine: "https://www.figma.com/api/mcp/asset/20fa464a-a8bb-444f-b903-931ac98db82c",
    secondaryBottomLine: "https://www.figma.com/api/mcp/asset/caa1776c-0149-4e41-861c-1703aa3ec0c5"
  };

  document.documentElement.style.setProperty("--nav-secondary-top-line", `url(${assets.secondaryTopLine})`);
  document.documentElement.style.setProperty("--nav-secondary-bottom-line", `url(${assets.secondaryBottomLine})`);

  const state = {
    step: 0,
    amount: "2.45",
    token: { symbol: "ETH", name: "Ethereum", network: "Mainnet" },
    recipient: "0xA9c1...2F9b",
    fee: "0.0032 ETH",
    eta: "~15 sec"
  };

  const contacts = [
    "0xA9c1...2F9b",
    "0xB3d8...17Ae",
    "vitalik.eth"
  ];

  const steps = [
    {
      label: "Amount",
      cta: "Continue",
      render() {
        return `
          <div class="hero">
            <small>Step 1</small>
            <h2>Set the amount</h2>
            <p>Start from the DS navigation shell, then push the user into a single focused action with minimal friction.</p>
          </div>
          <div class="token-card">
            <div class="token-icon">${state.token.symbol}</div>
            <div class="token-meta">
              <strong>${state.token.name}</strong>
              <span>${state.token.network} · Available 12.80 ETH</span>
            </div>
            <span class="address-pill">Live</span>
          </div>
          <div class="panel">
            <p class="section-label">Amount</p>
            <div class="amount-box">
              <div class="amount-field">
                <input id="amountInput" type="text" inputmode="decimal" value="${state.amount}" aria-label="Send amount">
                <span class="amount-unit">${state.token.symbol}</span>
              </div>
              <div class="helper">
                <span>≈ $${(Number(state.amount || 0) * 3185.42).toFixed(2)}</span>
                <span>Min transfer 0.01 ETH</span>
              </div>
            </div>
            <div class="quick-actions">
              ${["0.50", "1.00", "2.45", "Max"].map((value) => `
                <button class="quick-pill ${value === state.amount || (value === "Max" && state.amount === "12.80") ? "active" : ""}" data-amount="${value}" type="button">${value}</button>
              `).join("")}
            </div>
          </div>
          <div class="summary-row">
            <div>
              <small>Delivery</small>
              <strong>Recipient step next</strong>
            </div>
            <span>One clean primary path</span>
          </div>
        `;
      },
      afterRender() {
        const amountInput = document.getElementById("amountInput");
        amountInput?.addEventListener("input", (event) => {
          state.amount = event.target.value.replace(/[^0-9.]/g, "");
          updateFooter();
        });
        document.querySelectorAll("[data-amount]").forEach((button) => {
          button.addEventListener("click", () => {
            state.amount = button.dataset.amount === "Max" ? "12.80" : button.dataset.amount;
            render();
          });
        });
      },
      valid() {
        return Number(state.amount) > 0;
      }
    },
    {
      label: "Recipient",
      cta: "Review",
      render() {
        return `
          <div class="hero">
            <small>Step 2</small>
            <h2>Choose the recipient</h2>
            <p>Use restrained chips, a single dominant input shell, and DS-neutral spacing for a quick mobile handoff.</p>
          </div>
          <div class="panel">
            <div class="input-shell">
              <label for="recipientInput">Wallet address or ENS</label>
              <input id="recipientInput" type="text" value="${state.recipient}" placeholder="Paste address or name">
            </div>
            <div>
              <p class="section-label">Recent recipients</p>
              <div class="contact-grid">
                ${contacts.map((item) => `
                  <button class="contact-chip ${item === state.recipient ? "active" : ""}" data-contact="${item}" type="button">${item}</button>
                `).join("")}
              </div>
            </div>
            <div class="summary-row">
              <div>
                <small>Network guard</small>
                <strong>Ethereum compatible</strong>
              </div>
              <span>${state.token.network}</span>
            </div>
          </div>
        `;
      },
      afterRender() {
        const input = document.getElementById("recipientInput");
        input?.addEventListener("input", (event) => {
          state.recipient = event.target.value.trim();
          updateFooter();
        });
        document.querySelectorAll("[data-contact]").forEach((button) => {
          button.addEventListener("click", () => {
            state.recipient = button.dataset.contact;
            render();
          });
        });
      },
      valid() {
        return state.recipient.length >= 8;
      }
    },
    {
      label: "Review",
      cta: `Send ${state.amount || "0"} ${state.token.symbol}`,
      render() {
        return `
          <div class="hero">
            <small>Step 3</small>
            <h2>Review before sending</h2>
            <p>Final confirmation stays compact: summary rows, one risk note, one primary action.</p>
          </div>
          <div class="review-grid">
            <div class="summary-row">
              <div>
                <small>Send</small>
                <strong>${state.amount} ${state.token.symbol}</strong>
              </div>
              <span>≈ $${(Number(state.amount || 0) * 3185.42).toFixed(2)}</span>
            </div>
            <div class="summary-row">
              <div>
                <small>To</small>
                <strong>${state.recipient}</strong>
              </div>
              <span>Saved contact</span>
            </div>
            <div class="summary-row">
              <div>
                <small>Network fee</small>
                <strong>${state.fee}</strong>
              </div>
              <span>${state.eta}</span>
            </div>
          </div>
          <div class="notice">
            <strong>Heads-up</strong>
            <p>Only send assets to Ethereum-compatible addresses. This prototype keeps the warning visible without breaking the primary flow.</p>
          </div>
          <div class="panel">
            <p class="section-label">Transfer path</p>
            <div class="meta-row">
              <span>Wallet 1</span>
              <span>${state.recipient}</span>
            </div>
            <div class="meta-row">
              <span>Main amount</span>
              <span>${state.amount} ${state.token.symbol}</span>
            </div>
          </div>
        `;
      },
      valid() {
        return Number(state.amount) > 0 && state.recipient.length >= 8;
      }
    },
    {
      label: "Done",
      cta: "Restart demo",
      render() {
        return `
          <div class="success-shell">
            <div class="success-badge">✓</div>
            <div class="hero">
              <small>Step 4</small>
              <h2>Transfer queued</h2>
              <p>The success state stays within the same DS shell, so the user never loses spatial context on mobile.</p>
            </div>
            <div class="panel">
              <div class="summary-row">
                <div>
                  <small>Amount</small>
                  <strong>${state.amount} ${state.token.symbol}</strong>
                </div>
                <span>Submitted</span>
              </div>
              <div class="summary-row">
                <div>
                  <small>Recipient</small>
                  <strong>${state.recipient}</strong>
                </div>
                <span>Txn #29F4</span>
              </div>
            </div>
          </div>
        `;
      },
      valid() {
        return true;
      }
    }
  ];

  const stepper = document.getElementById("stepper");
  const content = document.getElementById("content");
  const navShell = document.getElementById("navShell");
  const ctaButton = document.getElementById("ctaButton");
  const footerLeft = document.getElementById("footerLeft");
  const footerRight = document.getElementById("footerRight");
  const footerNote = document.getElementById("footerNote");

  function renderNav() {
    if (state.step === 0) {
      navShell.innerHTML = `
        <div class="primary-nav">
          <div class="nav-backdrop"></div>
          <div class="nav-status">
            <span>9:41</span>
            <span class="nav-status-right">◔◔ 5G ▱</span>
          </div>
          <div class="nav-row">
            <div class="nav-brand-icon" aria-hidden="true"><img src="${assets.primaryLogo}" alt=""></div>
            <div class="nav-actions">
              <div class="token-bar" aria-label="Token switcher">
                <div class="token-stack"><img src="${assets.primaryTokens}" alt=""></div>
              </div>
              <div class="nav-icon" aria-hidden="true"><img src="${assets.primarySearch}" alt=""></div>
              <div class="nav-icon" aria-hidden="true"><img src="${assets.primaryMenu}" alt=""></div>
            </div>
          </div>
          <div class="beta-pill">Beta</div>
        </div>
      `;
      return;
    }

    navShell.innerHTML = `
      <div class="secondary-nav">
        <button class="secondary-back" id="backButton" type="button" aria-label="Back"><img src="${assets.secondaryBack}" alt=""></button>
        <div class="secondary-title">${state.step === 1 ? "Recipient" : state.step === 2 ? "Review Transaction" : "Transfer Status"}</div>
      </div>
    `;

    const backButton = document.getElementById("backButton");
    backButton?.addEventListener("click", () => {
      if (state.step === 0) return;
      state.step -= 1;
      render();
    });
  }

  function updateFooter() {
    footerLeft.textContent = `${state.token.name} · ${state.amount || "0"} ${state.token.symbol}`;
    footerRight.textContent = state.step === 2 ? state.fee : "Safe preview";
    footerNote.textContent = state.step === 3
      ? "Success state is simulated for DS exploration."
      : "Demo state only. No transaction is signed.";
    ctaButton.textContent = state.step === 2 ? `Send ${state.amount || "0"} ${state.token.symbol}` : steps[state.step].cta;
    ctaButton.disabled = !steps[state.step].valid();
  }

  function renderStepper() {
    stepper.innerHTML = steps.map((_, index) => {
      const stateClass = index < state.step ? "complete" : index === state.step ? "active" : "";
      return `<div class="step-dot ${stateClass}"></div>`;
    }).join("");
  }

  function render() {
    renderNav();
    renderStepper();
    content.innerHTML = steps[state.step].render();
    steps[state.step].afterRender?.();
    updateFooter();
  }

  ctaButton.addEventListener("click", () => {
    if (!steps[state.step].valid()) return;
    state.step = state.step === steps.length - 1 ? 0 : state.step + 1;
    render();
  });

  render();
</script>
</body>
</html>
